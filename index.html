<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Educacional</title>

<style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container{
    background-color: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    max-width: 600px;
    width: 90%;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

h1{
    color: #1565C0;
    margin-bottom: 20px;
    font-size: 2.2rem;
}

p{
    color: #444;
    font-size: 1.1rem;
    margin-bottom: 30px;
    line-height: 1.6;
}

.botao{
    display: inline-block;
    background-color: #4CAF50;
    color: white;
    text-decoration: none;
    padding: 15px 35px;
    border-radius: 12px;
    font-size: 1.3rem;
    font-weight: bold;
    transition: all 0.3s ease;
}

.botao:hover{
    background-color: #388E3C;
    transform: scale(1.08);
}

.emoji{
    font-size: 60px;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

    <div class="emoji">📚</div>

    <h1>Bem-vindo ao App Educacional!</h1>

    <p>
        Aprenda brincando! Escolha a palavra correta para cada imagem,
        acumule acertos e desenvolva sua leitura de forma divertida.
    </p>

    <a href="pg002.html" class="botao">
        COMEÇAR ▶
    </a>

</div>

</body>
</html>
